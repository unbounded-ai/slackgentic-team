name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate version tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          tag_name = os.environ["TAG_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?", tag_name):
              raise SystemExit(f"release tags must look like vX.Y.Z: {tag_name}")
          tag_version = tag_name.removeprefix("v")

          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          pyproject_version = project["version"]
          init_text = Path("src/agent_harness/__init__.py").read_text()
          match = re.search(r'^__version__ = "([^"]+)"$', init_text, re.MULTILINE)
          init_version = match.group(1) if match else None

          versions = {
              "tag": tag_version,
              "pyproject.toml": pyproject_version,
              "src/agent_harness/__init__.py": init_version,
          }
          if len(set(versions.values())) != 1:
              raise SystemExit(f"version mismatch: {versions}")
          PY

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --verify-tag --generate-notes
