name: Release

permissions:
  contents: write

on:
  push:
    branches: [main]

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve release version
        id: version
        run: |
          python - <<'PY' >>"$GITHUB_OUTPUT"
          import re
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          pyproject_version = project["version"]
          init_text = Path("src/agent_harness/__init__.py").read_text()
          match = re.search(r'^__version__ = "([^"]+)"$', init_text, re.MULTILINE)
          init_version = match.group(1) if match else None

          versions = {
              "pyproject.toml": pyproject_version,
              "src/agent_harness/__init__.py": init_version,
          }
          if len(set(versions.values())) != 1:
              raise SystemExit(f"version mismatch: {versions}")

          version = pyproject_version
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?", version):
              raise SystemExit(f"version must look like X.Y.Z: {version}")

          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Skip if tag already exists
        id: check
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/$TAG_NAME" >/dev/null; then
            echo "Tag $TAG_NAME already exists; nothing to release."
            echo "exists=true" >>"$GITHUB_OUTPUT"
          else
            echo "exists=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG_NAME" --verify-tag --generate-notes
